<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BookingApp</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Design System -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/pages/login.css" />
  </head>
  <body>
    <div
      class="container-fluid vh-100 d-flex align-items-center justify-content-center login-container"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div
            class="card shadow-lg"
          >
            <div class="card-body p-5">
              <!-- Logo/Title -->
              <div class="text-center mb-4">
                <i class="fas fa-cut fa-3x text-accent mb-3"></i>
                <h2 class="fw-bold">BookingApp</h2>
                <p class="text-muted">Panel de Administración</p>
              </div>

              <!-- Login Form -->
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label">Usuario</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                      <i class="fas fa-user text-muted"></i>
                    </span>
                    <input
                      type="text"
                      class="form-control border-start-0"
                      id="username"
                      name="username"
                      placeholder="Ingresa tu usuario"
                      required
                      autocomplete="username"
                    />
                  </div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                      <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input
                      type="password"
                      class="form-control border-start-0"
                      id="password"
                      name="password"
                      placeholder="Ingresa tu contraseña"
                      required
                      autocomplete="current-password"
                    />
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 fw-bold"
                >
                  <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                </button>
              </form>

              <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none text-muted">
                  <i class="fas fa-arrow-left me-1"></i> Volver al inicio
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Config -->
    <script src="./js/config.js"></script>

    <!-- Auth Service -->
    <script src="./js/services/auth-service.js"></script>

    <!-- Login Logic -->
    <script>
      function showLoginToast(message, type) {
        if (typeof Toastify !== "undefined") {
          const colors = {
            success: "#28a745",
            error: "#dc3545",
          };
          Toastify({
            text: message,
            duration: 3000,
            gravity: "top",
            position: "right",
            style: { background: colors[type] || "#17a2b8" },
            stopOnFocus: true,
          }).showToast();
        } else {
          alert(message);
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const submitBtn = e.target.querySelector('[type="submit"]');

          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin me-2"></i>Iniciando sesión...';

          try {
            await window.authService.login(username, password);
            showLoginToast("✅ Inicio de sesión exitoso", "success");
            setTimeout(() => {
              window.location.href = "admin.html";
            }, 1000);
          } catch (error) {
            showLoginToast("❌ " + error.message, "error");
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              '<i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión';
          }
        });
    </script>
  </body>
</html>
